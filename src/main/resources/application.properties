spring.application.name=testelasticsearch
spring.elasticsearch.uris=${ELASTICSEARCH_HOST:localhost}:${ELASTICSEARCH_PORT:9200}
spring.elasticsearch.ssl.verification-mode=none
spring.data.elasticsearch.repositories.enabled=true
spring.data.elasticsearch.auto-index-creation=false

# --- CONFIGURATION POSTGRESQL ---
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:book_db}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
